name: Build IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Bazel configuration'
        type: choice
        default: 'release_arm64'
        options:
          - release_arm64
          - release_universal
      configurationPath:
        description: 'Build configuration json'
        type: string
        default: 'build-system/gramsrv-ci-configuration.json'
      runner:
        description: 'GitHub runner image'
        type: choice
        default: 'macos-26'
        options:
          - macos-26
          - macos-15
      makeRelease:
        description: 'Publish the IPA as a GitHub release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Select Xcode
        run: |
          ls -la /Applications | grep -i xcode || true
          PINNED=$(python3 -c 'import json;print(json.load(open("versions.json"))["xcode"])')
          # prefer the exact version versions.json pins, then any other Xcode 26.x
          CANDIDATES="/Applications/Xcode_$PINNED.app /Applications/Xcode_$PINNED.0.app"
          CANDIDATES="$CANDIDATES $(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -rV) /Applications/Xcode.app"
          XCODE=""
          for candidate in $CANDIDATES; do
            if [ -x "$candidate/Contents/Developer/usr/bin/xcodebuild" ]; then
              XCODE=$(python3 -c 'import os,sys;print(os.path.realpath(sys.argv[1]))' "$candidate")
              break
            fi
          done
          if [ -z "$XCODE" ]; then echo "No usable Xcode found"; exit 1; fi
          echo "Using $XCODE (pinned: $PINNED)"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          df -h /

      - name: Compute build number
        run: |
          APP_VERSION=$(python3 -c 'import json;print(json.load(open("versions.json"))["app"])')
          OFFSET=$(cat build_number_offset)
          BUILD_NUMBER=$((OFFSET + ${{ github.run_number }}))
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Import fake codesigning certificates
        run: python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Build
        run: |
          set -x
          python3 -u build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --configurationPath="${{ inputs.configurationPath }}" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration="${{ inputs.configuration }}" \
            --buildNumber="$BUILD_NUMBER"

      - name: Collect IPA
        run: |
          set -x
          mkdir -p build/artifacts
          IPA="bazel-bin/Telegram/Telegram.ipa"
          if [ ! -f "$IPA" ]; then
            IPA=$(find -L bazel-out -name Telegram.ipa -type f | head -1)
          fi
          if [ -z "$IPA" ] || [ ! -f "$IPA" ]; then echo "No IPA produced"; exit 1; fi
          cp "$IPA" build/artifacts/
          ls -lh build/artifacts

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: build/artifacts/Telegram.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Collect dSYMs
        continue-on-error: true
        run: |
          mkdir -p build/DSYMs
          cp -R bazel-bin/Telegram/*.dSYM build/DSYMs/ || true
          zip -qr build/Telegram.DSYMs.zip build/DSYMs
          ls -lh build/Telegram.DSYMs.zip

      - name: Upload dSYMs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}-dSYMs
          path: build/Telegram.DSYMs.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Create release
        if: ${{ inputs.makeRelease }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: gramsrv iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Unsigned build of the gramsrv-patched Telegram for iOS.
            Points at 217.60.245.50:2398 (DC 2). Re-sign with Sideloadly / AltStore before installing.
          files: build/artifacts/Telegram.ipa
