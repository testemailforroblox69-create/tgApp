name: Build IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Bazel configuration'
        type: choice
        default: 'release_arm64'
        options:
          - release_arm64
          - release_universal
      configurationPath:
        description: 'Build configuration json'
        type: string
        default: 'build-system/gramsrv-ci-configuration.json'
      runner:
        description: 'GitHub runner image'
        type: choice
        default: 'macos-26'
        options:
          - macos-26
          - macos-15
      makeRelease:
        description: 'Publish the IPA as a GitHub release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Free up disk space
        run: |
          df -h /
          # keep only the Xcode we are going to use
          KEEP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$KEEP" ]; then KEEP=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Keeping $KEEP"
          for app in /Applications/Xcode*.app; do
            if [ "$app" != "$KEEP" ]; then sudo rm -rf "$app"; fi
          done
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          df -h /

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Compute build number
        run: |
          APP_VERSION=$(python3 -c 'import json;print(json.load(open("versions.json"))["app"])')
          OFFSET=$(cat build_number_offset)
          BUILD_NUMBER=$((OFFSET + ${{ github.run_number }}))
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Import fake codesigning certificates
        run: python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Build
        run: |
          set -x
          python3 -u build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --configurationPath="${{ inputs.configurationPath }}" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration="${{ inputs.configuration }}" \
            --buildNumber="$BUILD_NUMBER"

      - name: Collect artifacts
        run: |
          set -x
          mkdir -p build/artifacts
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" build/artifacts/
          done
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/ || true
          done
          zip -r build/artifacts/Telegram.DSYMs.zip build/DSYMs 1>/dev/null || true
          ls -lh build/artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: build/artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Create release
        if: ${{ inputs.makeRelease }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: gramsrv iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Unsigned build of the gramsrv-patched Telegram for iOS.
            Points at 217.60.245.50:2398 (DC 2). Re-sign with Sideloadly / AltStore before installing.
          files: build/artifacts/*
